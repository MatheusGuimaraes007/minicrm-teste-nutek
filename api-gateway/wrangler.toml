name = "minicrm-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
AUTH_SERVICE_URL = "http://auth.localhost"
N8N_WEBHOOK_URL = "http://n8n.localhost"
CORS_ORIGIN = "http://localhost:5173"

# Production environment
[env.production]
vars = { CORS_ORIGIN = "https://minicrm.pages.dev" }

# JWT_SECRET is set via `wrangler secret put JWT_SECRET`
